
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Dia dos Namorados ❤️</title>

<style>
@media (max-width: 768px){

    body{
        padding:20px;
        box-sizing:border-box;
    }

    .container{
        width:100%;
        max-width:100%;
        padding:10px;
        box-sizing:border-box;
    }

    h1{
        font-size:28px;
    }

    h2{
        font-size:22px;
    }

    p{
        font-size:18px;
    }

    #contador{
        font-size:22px;
        line-height:1.5;
    }

    button{
        width:90%;
        max-width:350px;
        display:block;
        margin:10px auto;
        font-size:16px;
    }

    #mensagem{
        font-size:18px;
        padding:0 10px;
    }

    .flor{
        transform:scale(0.9);
        margin-bottom:10px;
    }
}

</style>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(to bottom,#ffe6f0,#fff);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    min-height:100vh;
    overflow-x:hidden;
    text-align:center;
}

h1{
    color:#d63384;
}

.flor{
    position:relative;
    width:120px;
    height:220px;
    margin-bottom:20px;
}

.caule{
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:8px;
    background:green;
    animation:crescer 3s forwards;
}

.petalas{
    opacity:0;
    animation:aparecer 2s forwards;
    animation-delay:3s;
}

.petala{
    width:50px;
    height:50px;
    background:#ff69b4;
    border-radius:50%;
    position:absolute;
}

.p1{top:20px;left:35px;}
.p2{top:50px;left:10px;}
.p3{top:50px;left:60px;}
.p4{top:80px;left:35px;}

.miolo{
    width:35px;
    height:35px;
    background:gold;
    border-radius:50%;
    position:absolute;
    top:55px;
    left:42px;
}

@keyframes crescer{
    from{height:0;}
    to{height:140px;}
}

@keyframes aparecer{
    from{
        opacity:0;
        transform:scale(0);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.container{
    display:none;
    max-width:700px;
    padding:20px;
}

button{
    margin:10px;
    padding:12px 20px;
    border:none;
    border-radius:20px;
    background:#ff69b4;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#d63384;
    transform:scale(1.05);
}

#mensagem{
    margin-top:20px;
    font-size:20px;
    color:#c2185b;
    font-weight:bold;
}

#contador{
    font-size:24px;
    color:#d63384;
    font-weight:bold;
    margin:20px 0;
}

.coracao{
    position:fixed;
    top:-20px;
    animation:cair linear forwards;
    z-index:-1;
}

@keyframes cair{
    to{
        transform:translateY(110vh);
    }
}

</style>
</head>

<body>

<div class="flor">
    <div class="caule"></div>

    <div class="petalas">
        <div class="petala p1"></div>
        <div class="petala p2"></div>
        <div class="petala p3"></div>
        <div class="petala p4"></div>
        <div class="miolo"></div>
    </div>
</div>

<div class="container" id="conteudo">

    <h1>❤️ Feliz Dia dos Namorados ❤️</h1>

    <p>
        Para o amor da minha vida Luis ❤️
    </p>

    <h2>Estamos juntos há:</h2>

    <div id="contador"></div>

    <button onclick="mostrar(1)">💌 Primeira mensagem</button>
    <button onclick="mostrar(2)">🌹 Segunda mensagem</button>
    <button onclick="mostrar(3)">✨ Terceira mensagem</button>
    <button onclick="mostrar(4)">💖 Mensagem especial</button>

    <div id="mensagem"></div>

</div>

<script>

// ALTERE A DATA ABAIXO PARA A DATA REAL DE VOCÊS
const inicioNamoro = new Date("2024-07-26");

function atualizarContador(){

    const agora = new Date();

    const diferenca = agora - inicioNamoro;

    const dias = Math.floor(
        diferenca / (1000 * 60 * 60 * 24)
    );

    const horas = Math.floor(
        (diferenca % (1000 * 60 * 60 * 24))
        / (1000 * 60 * 60)
    );

    const minutos = Math.floor(
        (diferenca % (1000 * 60 * 60))
        / (1000 * 60)
    );

    const segundos = Math.floor(
        (diferenca % (1000 * 60))
        / 1000
    );

    document.getElementById("contador").innerHTML =
        `${dias} dias ❤️ ${horas} horas ❤️ ${minutos} minutos ❤️ ${segundos} segundos`;
}

setInterval(atualizarContador,1000);
atualizarContador();

setTimeout(() => {
    document.getElementById("conteudo").style.display = "block";
}, 5000);

function mostrar(num){

    const mensagens = {

       1:"Te ver feliz, sorrindo, é ser feliz duas vezes. ❤️",
        2:"Apesar de estar longe dos meus olhos, você nunca está longe dos meus pensamentos. 🌹",
        3:"Com você, eu descobri que casa não é um lugar, é uma pessoa. ✨",
        4:"Eu te amo hoje, amanhã e em todos os dias que ainda vamos viver juntos. 💖"
    };

    document.getElementById("mensagem").innerHTML =
        mensagens[num];
}

function criarCoracao(){

    const coracao = document.createElement("div");

    coracao.innerHTML = "❤️";

    coracao.classList.add("coracao");

    coracao.style.left =
        Math.random() * 100 + "vw";

    coracao.style.fontSize =
        (15 + Math.random() * 25) + "px";

    coracao.style.animationDuration =
        (5 + Math.random() * 5) + "s";

    document.body.appendChild(coracao);

    setTimeout(() => {
        coracao.remove();
    },10000);
}

setInterval(criarCoracao,300);

</script>

</body>
</html>
